; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32doit-devkit-v1]
platform = espressif32
board = esp32doit-devkit-v1
framework = arduino
monitor_speed = 115200
upload_speed = 115200
build_src_filter = +<esp32/> -<esp8266/>
build_flags =
    -D BOARD_TYPE=\"esp32doit-devkit-v1\"
    -D FIRMWARE_VERSION=\"1.0.7\"
    -I src/esp32
lib_deps =
    tzapu/WiFiManager @ ^2.0.6
    bblanchon/ArduinoJson @ ^6.21.2
    knolleary/PubSubClient @ ^2.8
    https://github.com/mandulaj/PZEM-004T-v30.git

[env:nodemcuv2]
platform = espressif8266
board = nodemcuv2
framework = arduino
monitor_speed = 115200
upload_speed = 115200
build_src_filter = +<esp8266/> -<esp32/>
build_flags =
    -D BOARD_TYPE=\"nodemcuv2\"
    -D FIRMWARE_VERSION=\"1.0.7\"
    -I src/esp8266
lib_deps =
    tzapu/WiFiManager @ ^2.0.6
    bblanchon/ArduinoJson @ ^6.21.2
    knolleary/PubSubClient @ ^2.8
    https://github.com/mandulaj/PZEM-004T-v30.git

