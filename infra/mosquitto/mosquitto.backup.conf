listener 1883
allow_anonymous false
password_file /mosquitto/config/passwd
persistence true
persistence_location /mosquitto/data/

# --- Bidirectional MQTT Bridge to Primary VPS ---
connection bridge-to-primary
address 113.161.220.166:1883
remote_username meterMQTT
remote_password meterMQTT

# Bridge telemetry in both directions so both databases receive real-time data
topic meter/+/data both 0
topic meter/+/ota/status both 0

# Bridge control and OTA jobs in both directions so commands triggered on either server are executed
topic meter/+/control both 0
topic firmwareUpdateOTA/device/+ both 0

cleansession false
notifications true
restart_timeout 10
