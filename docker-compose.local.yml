services:
  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./infra/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_local_data:/mosquitto/data

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodb_local_data:/data/db

  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env.local
    ports:
      - "3000:3000"
    depends_on:
      - mosquitto
      - mongodb
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/healthz').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  mosquitto_local_data:
  mongodb_local_data:
